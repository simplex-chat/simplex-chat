<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="680" height="470" fill="#ffffff"/>
  <text x="340" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Compact states</text>

  <!-- S3 Canceled, still active -->
  <rect x="20" y="52" width="308" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="36" y="78" font-size="12.5" font-weight="700" fill="#1d4ed8">S3 · Canceled, still active</text>
  <text x="36" y="102" font-size="13" fill="#0f172a">★ Supporter — active until 31 Aug 2026,</text>
  <text x="36" y="120" font-size="13" fill="#0f172a">then expires. Auto-renew OFF.</text>
  <rect x="36" y="132" width="120" height="30" rx="8" fill="#2563eb"/>
  <text x="96" y="152" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Resubscribe</text>

  <!-- S5 Expired -->
  <rect x="352" y="52" width="308" height="120" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="368" y="78" font-size="12.5" font-weight="700" fill="#475569">S5 · Expired</text>
  <text x="368" y="102" font-size="13" fill="#64748b">☆ Supporter — Expired 31 Aug 2026</text>
  <text x="368" y="120" font-size="11.5" fill="#94a3b8">badge dim ≤31 days, then hidden</text>
  <rect x="368" y="132" width="96" height="30" rx="8" fill="#475569"/>
  <text x="416" y="152" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Renew</text>
  <rect x="474" y="132" width="110" height="30" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="529" y="152" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">Subscribe</text>

  <!-- S6 Pending payment (Stripe/desktop) -->
  <rect x="20" y="192" width="308" height="120" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="36" y="218" font-size="12.5" font-weight="700" fill="#854d0e">S6 · Pending payment (desktop/Stripe)</text>
  <text x="36" y="242" font-size="13" fill="#0f172a">Waiting for payment…  ⏳</text>
  <text x="36" y="262" font-size="11.5" fill="#94a3b8">timeout ~15 min → prior state (link persists)</text>
  <rect x="36" y="272" width="160" height="30" rx="8" fill="#f59e0b"/>
  <text x="116" y="292" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Open payment page</text>

  <!-- S7 Pending issuance -->
  <rect x="352" y="192" width="308" height="120" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="368" y="218" font-size="12.5" font-weight="700" fill="#854d0e">S7 · Pending issuance</text>
  <text x="368" y="244" font-size="13" fill="#0f172a">Finalizing your badge…  ⟳</text>
  <text x="368" y="266" font-size="11.5" fill="#94a3b8">seconds; else stays pending (21-day delivery).</text>
  <text x="368" y="284" font-size="11.5" fill="#94a3b8">verifyCredential → install → S1/S2.</text>

  <!-- S4 banner -->
  <rect x="20" y="336" width="640" height="110" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="36" y="362" font-size="12.5" font-weight="700" fill="#9a3412">S4 · Payment-issue banner (overlays S2/S3)</text>
  <text x="36" y="388" font-size="14" font-weight="700" fill="#9a3412">⚠  Payment problem — badge may lapse soon</text>
  <rect x="36" y="400" width="180" height="32" rx="8" fill="#ea580c"/>
  <text x="126" y="421" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Fix payment method</text>
  <text x="232" y="410" font-size="11.5" fill="#7c2d12">grace: badge stays BSActive until its coarse expiry;</text>
  <text x="232" y="427" font-size="11.5" fill="#7c2d12">once it lapses to BSExpired the file-size perk drops.</text>
</svg>
